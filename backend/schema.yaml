components:
  schemas:
    Achievement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
        category_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        icon:
          type: string
          description: Icon identifier for the frontend
          maxLength: 50
        points:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        max_claims_per_term:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Maximum times this achievement can be claimed per term
        requires_approval:
          type: boolean
        auto_approve_conditions:
          nullable: true
          description: Conditions for automatic approval in JSON format
        voice_message:
          type: string
          description: Encouraging message to speak when achievement is earned
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - category_name
      - created_at
      - description
      - icon
      - id
      - name
      - updated_at
      - voice_message
    AchievementCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          description: Icon identifier for the frontend
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - icon
      - id
      - name
      - updated_at
    ActionTypeEnum:
      enum:
      - assign_role
      type: string
      description: '* `assign_role` - Assign Role'
    ApprovalRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action_type:
          $ref: '#/components/schemas/ActionTypeEnum'
        status:
          allOf:
          - $ref: '#/components/schemas/ApprovalRequestStatusEnum'
          readOnly: true
        requested_by:
          type: integer
          readOnly: true
        requested_by_detail:
          type: string
          readOnly: true
        target_user:
          type: integer
          nullable: true
        target_user_detail:
          type: string
          readOnly: true
        reviewed_by:
          type: integer
          readOnly: true
          nullable: true
        reviewed_by_detail:
          type: string
          readOnly: true
        reviewed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        payload: {}
        comment:
          type: string
        approved_payload:
          readOnly: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action_type
      - approved_payload
      - created_at
      - id
      - requested_by
      - requested_by_detail
      - reviewed_at
      - reviewed_by
      - reviewed_by_detail
      - status
      - target_user_detail
      - updated_at
    ApprovalRequestStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
        * `cancelled` - Cancelled
    Assignment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        unit:
          type: integer
          nullable: true
        unit_title:
          type: string
          readOnly: true
        lecturer:
          type: integer
          nullable: true
        lecturer_name:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        due_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - lecturer_name
      - title
      - unit_title
      - updated_at
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event_id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
        actor_user:
          type: integer
          nullable: true
        actor_user_detail:
