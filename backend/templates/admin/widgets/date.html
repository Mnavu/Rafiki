{% load jazzmin %}

<div class="input-group" id="{{ widget.attrs.id }}-wrapper" data-target-input="nearest">
    <input
        type="text"
        class="form-control datetimepicker-input"
        data-target="#{{ widget.attrs.id }}-wrapper"
        name="{{ widget.name }}"
        id="{{ widget.attrs.id }}"
        {% if widget.value %}value="{{ widget.value|date:widget.format }}"{% endif %}
    />
    <div class="input-group-append" data-target="#{{ widget.attrs.id }}-wrapper" data-toggle="datetimepicker">
        <div class="input-group-text"><i class="fas fa-calendar"></i></div>
    </div>
</div>

<style>
    /* Fix the 'Black Blobs' - ensuring the header icons are visible and spaced */
    .bootstrap-datetimepicker-widget .datepicker-days table thead tr:first-child th {
        background: none !important;
        color: #333 !important;
        width: 35px !important;
        height: 35px !important;
        vertical-align: middle !important;
        padding: 0 !important;
    }
    .prev-year-btn, .next-year-btn {
        cursor: pointer;
        font-size: 0.9rem;
    }
    .prev-year-btn:hover, .next-year-btn:hover {
        background-color: rgba(0,0,0,0.05) !important;
    }
    /* This forces the header to be wide enough for 5 buttons */
    .bootstrap-datetimepicker-widget .datepicker-days table thead {
        display: table-header-group !important;
    }
</style>

<script>
(function ($) {
    $(function () {
        var $picker = $('#{{ widget.attrs.id }}-wrapper');

        $picker.datetimepicker({
            format: 'YYYY-MM-DD',
            locale: '{{ LANGUAGE_CODE }}',
            icons: {
                previous: 'fas fa-chevron-left',
                next: 'fas fa-chevron-right',
            }
        });

        function injectYearButtons() {
            // Get the widget DOM element
            var data = $picker.data("datetimepicker");
            if (!data || !data.widget) return;
            
            var widget = data.widget;
            var header = widget.find('.datepicker-days thead tr:first');

            // If buttons already exist, don't add them again
            if (header.find('.prev-year-btn').length > 0) return;

            // Create the buttons
            var $prevYear = $('<th class="prev-year-btn"><i class="fas fa-angle-double-left"></i></th>');
            var $nextYear = $('<th class="next-year-btn"><i class="fas fa-angle-double-right"></i></th>');

            // Insert them
            header.find('.prev').before($prevYear);
            header.find('.next').after($nextYear);

            // Add Click Events
            $prevYear.on('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                var d = $picker.datetimepicker('date');
                $picker.datetimepicker('date', d.subtract(1, 'year'));
            });

            $nextYear.on('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                var d = $picker.datetimepicker('date');
                $picker.datetimepicker('date', d.add(1, 'year'));
            });
        }

        // Run injection when picker opens
        $picker.on('show.td', function() {
            setTimeout(injectYearButtons, 10);
        });

        // Run injection every time the view updates (month change, etc)
        $picker.on('update.td', function() {
            setTimeout(injectYearButtons, 10);
        });
    });
})(jQuery);
</script>
