services:
  - type: web
    name: eduassist-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py restore_launch_bundle --skip-if-disabled --flush && python manage.py restore_bundled_media --skip-if-disabled
    startCommand: gunicorn edu_assist.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.netlify.app
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://.*\.netlify\.app$
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "0"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: AUTO_SEED_DEMO_DATA
        value: "1"
      - key: AUTO_SEED_UAT_DATA
        value: "1"
      - key: AUTO_ACTIVATE_DEMO_WORKFLOWS
        value: "1"
      - key: AUTO_RESTORE_LAUNCH_BUNDLE
        value: "0"
      - key: AUTO_RESTORE_BUNDLED_MEDIA
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: eduassist-db
          property: connectionString

databases:
  - name: eduassist-db
    databaseName: eduassist
    user: eduassist
