//p-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    // ADD THIS EXT BLOCK BELOW
    ext {
      buildToolsVersion = "35.0.0"
      minSdkVersion = 24           // Correct: Fixed the library mismatch
      compileSdkVersion = 35       // Recommended: High enough for your dependencies
      targetSdkVersion = 35        // Recommended: For Play Store compliance
      ndkVersion = "27.0.12077973" // Correct: Points to your stable download
      kotlinVersion = "2.0.21"
    }

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
    // Change from the dynamic version to this stable one
    classpath('com.android.tools.build:gradle:8.11.0')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    
    }
}
allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
